<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up - Flood Relief Management System</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    </head>

    <body class="bg-light">
        <div class="container-fluid">
            <div class="row min-vh-100">
                <div class="col-md-6 d-none d-md-flex bg-primary text-white p-5 flex-column justify-content-center">
                    <div class="text-center">
                        <i class="bi bi-file display-1 mb-4"></i>
                        <h1 class="display-4 fw-bold mb-3">Flood Relief Management System</h1>
                        <p class="lead mb-5">Supporting communities in times of need</p>

                        <div class="row text-center mt-5">
                            <div class="col-12">
                                <p class="small">Created for humanity by humanity <i class="bi bi-heart-fill"></i>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 d-flex align-items-center justify-content-center p-5">
                    <div class="w-100" style="max-width: 650px;">

                        <div class="text-center d-md-none mb-4">
                            <i class="bi bi-shield-fill-check text-primary" style="font-size: 3rem;"></i>
                            <h4 class="text-primary fw-bold">Flood Relief</h4>
                        </div>

                        <h2 class="fw-bold mb-2"><i class="bi bi-person-add"></i> Create Account</h2>
                        <p class="text-muted mb-4">Sign up to get started</p>

                        <form action="register.php" method="POST">
                            <div class="col-12 mb-3">
                                <label for="firstName" class="form-label">Name *</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>

                            <div class="col-12 mb-3">
                                <label for="phone" class="form-label">Contact Number</label>
                                <input type="tel" class="form-control" id="phone" name="phone" placeholder="0701234567"
                                    pattern="[0-9]{10}" title="Enter 10 digit phone number">
                            </div>

                            <div class="col-12 mb-3">
                                <label for="signupEmail" class="form-label">Email Address *</label>
                                <input type="email" class="form-control" id="signupEmail" name="email"
                                    placeholder="your.email@example.com">
                            </div>


                            <div class="col-12 mb-3">
                                <label for="signupPassword" class="form-label">Password *</label>
                                <input type="password" class="form-control" id="signupPassword" name="password"
                                    minlength="8" required>
                                <small class="text-muted">Min. 8 characters</small>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                            </div>

                            <p class="text-center mb-0">
                                Already have an account?
                                <a href="http://localhost/FullStackProject/LoginForm/login.html"
                                    class="text-primary fw-semibold text-decoration-none">Sign
                                    In</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>

</html>
