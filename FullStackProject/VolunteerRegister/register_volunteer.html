<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up - Flood Relief Management System</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link rel="stylesheet" href="register_style.css">
    </head>

    <body class="bg-light">

        <body class="bg-light">
            <div class="container-fluid">
                <div class="row min-vh-100">
                    <div class="col-md-6 d-none d-md-flex bg-primary text-white p-5 flex-column justify-content-center">
                        <div class="text-center">
                            <i class="bi bi-file display-1 mb-4"></i>
                            <h1 class="display-4 fw-bold mb-3">Flood Relief Management System</h1>
                            <p class="lead mb-5">Supporting communities in times of need</p>

                            <div class="row text-center mt-5">
                                <div class="col-12">
                                    <p class="small">Created for humanity by humanity <i class="bi bi-heart-fill"></i>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 d-flex align-items-center justify-content-center p-5">
                        <div class="w-100" style="max-width: 650px;">

                            <div class="text-center d-md-none mb-4">
                                <i class="bi bi-shield-fill-check text-primary" style="font-size: 3rem;"></i>
                                <h4 class="text-primary fw-bold">Flood Relief</h4>
                            </div>

                            <h2 class="fw-bold mb-2"><i class="bi bi-person-add"></i> Create Account</h2>
                            <p class="text-muted mb-4">Sign up to get started</p>

                            <form action="backend/auth/signup.php" method="POST">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="firstName" class="form-label">First Name *</label>
                                        <input type="text" class="form-control" id="firstName" name="firstname"
                                            required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="lastName" class="form-label">Last Name *</label>
                                        <input type="text" class="form-control" id="lastName" name="lastname" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="gender" class="form-label">Gender *</label>
                                        <select class="form-select" id="gender" name="gender" required>
                                            <option value="">Select gender</option>
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label for="dob" class="form-label">Date of Birth *</label>
                                        <input type="date" class="form-control" id="dob" name="dob" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="nic" class="form-label">NIC Number *</label>
                                    <input type="text" class="form-control" id="nic" name="nic"
                                        placeholder="e.g., 199512345678 or 951234567V"
                                        pattern="[0-9]{9}[vVxX]|[0-9]{12}"
                                        title="Enter valid NIC (e.g., 951234567V or 199512345678)" required>
                                    <small class="text-muted">Old format (9 digits + V/X) or New format (12
                                        digits)</small>
                                </div>



                                <div class="mb-3">
                                    <label for="address" class="form-label">Address *</label>
                                    <textarea class="form-control" id="address" name="address" rows="2"
                                        placeholder="House No., Street, Area" required></textarea>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="district" class="form-label">District *</label>
                                        <select class="form-select" id="district" name="district" required>
                                            <option value="">Select district</option>
                                            <option value="Colombo">Colombo</option>
                                            <option value="Gampaha">Gampaha</option>
                                            <option value="Kalutara">Kalutara</option>
                                            <option value="Kandy">Kandy</option>
                                            <option value="Matale">Matale</option>
                                            <option value="Nuwara Eliya">Nuwara Eliya</option>
                                            <option value="Galle">Galle</option>
                                            <option value="Matara">Matara</option>
                                            <option value="Hambantota">Hambantota</option>
                                            <option value="Jaffna">Jaffna</option>
                                            <option value="Kilinochchi">Kilinochchi</option>
                                            <option value="Mannar">Mannar</option>
                                            <option value="Vavuniya">Vavuniya</option>
                                            <option value="Mullaitivu">Mullaitivu</option>
                                            <option value="Batticaloa">Batticaloa</option>
                                            <option value="Ampara">Ampara</option>
                                            <option value="Trincomalee">Trincomalee</option>
                                            <option value="Kurunegala">Kurunegala</option>
                                            <option value="Puttalam">Puttalam</option>
                                            <option value="Anuradhapura">Anuradhapura</option>
                                            <option value="Polonnaruwa">Polonnaruwa</option>
                                            <option value="Badulla">Badulla</option>
                                            <option value="Monaragala">Monaragala</option>
                                            <option value="Ratnapura">Ratnapura</option>
                                            <option value="Kegalle">Kegalle</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="city" class="form-label">City/Town *</label>
                                        <input type="text" class="form-control" id="city" name="city"
                                            placeholder="e.g., Kaduwela" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="phone" class="form-label">Contact Number *</label>
                                        <input type="tel" class="form-control" id="phone" name="phone"
                                            placeholder="0701234567" pattern="[0-9]{10}"
                                            title="Enter 10 digit phone number" required>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label for="signupEmail" class="form-label">Email Address *</label>
                                        <input type="email" class="form-control" id="signupEmail" name="email"
                                            placeholder="your.email@example.com" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="signupPassword" class="form-label">Password *</label>
                                        <input type="password" class="form-control" id="signupPassword" name="password"
                                            minlength="8" required>
                                        <small class="text-muted">Min. 8 characters</small>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="confirmPassword" class="form-label">Confirm Password *</label>
                                        <input type="password" class="form-control" id="confirmPassword"
                                            name="confirm_password" minlength="8" required>
                                    </div>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                                </div>

                                <p class="text-center mb-0">
                                    Already have an account?
                                    <a href="http://localhost/FullStackProject/LoginForm/loginform.html"
                                        class="text-primary fw-semibold text-decoration-none">Sign
                                        In</a>
                                </p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bootstrap JS -->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        </body>

</html>
