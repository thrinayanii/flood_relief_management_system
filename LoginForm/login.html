<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Flood Relief Management System</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    </head>

    <body class="bg-light">
        <div class="container-fluid">
            <div class="row min-vh-100">
                <div class="col-md-6 d-none d-md-flex bg-primary text-white p-5 flex-column justify-content-center">
                    <div class="text-center">
                        <i class="bi bi-shield-fill-check display-1 mb-4"></i>
                        <h1 class="display-4 fw-bold mb-3">Flood Relief Management System</h1>
                        <p class="lead mb-5">Supporting communities in times of need</p>

                        <div class="row text-center mt-5">
                            <div class="col-12">
                                <p class="small">Created for humanity by humanity <i class="bi bi-heart-fill"></i></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 d-flex align-items-center justify-content-center p-5">
                    <div class="w-100" style="max-width: 450px;">
                        <div class="text-center d-md-none mb-4">
                            <i class="bi bi-shield-fill-check text-primary" style="font-size: 3rem;"></i>
                            <h4 class="text-primary fw-bold">Flood Relief</h4>
                        </div>
                        <h2 class="fw-bold mb-2">Welcome Back</h2>
                        <p class="text-muted mb-4">Sign in to access your account</p>

                        <form action="login.php" method="POST">
                            <div class="col-12 mb-3">
                                <label for="loginEmail" class="form-label">Email Address *</label>
                                <input type="email" class="form-control" id="loginEmail" name="email"
                                    placeholder="your.email@example.com" required>
                            </div>

                            <div class="col-12 mb-4">
                                <label for="loginPassword" class="form-label">Password *</label>
                                <input type="password" class="form-control" id="loginPassword" name="password"
                                    placeholder="Enter your password" required>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                            </div>

                            <p class="text-center mb-0">
                                Don't have an account?
                                <a href="http://localhost/FullStackProject/UserRegistration/register.html"
                                    class="text-primary fw-semibold text-decoration-none">Sign Up</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            const params = new URLSearchParams(window.location.search);
            if (params.get("success") === "1") {
                alert("Account created successfully!");
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        </script>

    </body>

</html>
